<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1a2d"/>
      <stop offset="100%" stop-color="#060a12"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="50%" stop-color="#0080aa"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="64" cy="64" r="62" fill="url(#bg)" stroke="url(#ring)" stroke-width="2"/>

  <!-- Inner glow -->
  <circle cx="64" cy="64" r="48" fill="url(#glow)"/>

  <!-- Hex frame (subtle) -->
  <polygon points="64,18 106,38 106,90 64,110 22,90 22,38"
           fill="none" stroke="#00e5ff" stroke-width="0.8" opacity="0.2"/>

  <!-- NAU text -->
  <text x="64" y="74" text-anchor="middle" font-family="'Helvetica Neue','Arial',sans-serif"
        font-weight="700" font-size="36" letter-spacing="3" fill="url(#txt)">
    NAU
  </text>

  <!-- Orbital dots -->
  <circle cx="64" cy="5" r="2" fill="#00e5ff" opacity="0.8"/>
  <circle cx="123" cy="64" r="1.5" fill="#00e5ff" opacity="0.6"/>
  <circle cx="64" cy="123" r="1.5" fill="#00e5ff" opacity="0.5"/>
  <circle cx="5" cy="64" r="1.5" fill="#00e5ff" opacity="0.4"/>

  <!-- Edge highlight -->
  <circle cx="64" cy="64" r="61" fill="none" stroke="#00e5ff" stroke-width="0.4" opacity="0.3"/>
</svg>
